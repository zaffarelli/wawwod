   <text x="125" y="10" style="font-size:4pt;font-family:Khand;font-variant:normal;font-weight:bold;fill:#80F080;stroke:#e0e0e0;stroke-width:0.05;opacity:.5;text-anchor:end;">Vampire the Masquerade</text>
